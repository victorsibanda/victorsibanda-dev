<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Victor Sibanda — Cloud Architect & Platform Engineer</title>
<meta name="description" content="Victor Sibanda — Senior DevOps Engineer building toward Solutions Architecture. Cloud platforms, AWS migrations, IaC, and CI/CD.">
<meta property="og:title" content="Victor Sibanda — Cloud Architect & Platform Engineer">
<meta property="og:description" content="Senior DevOps Engineer building toward Solutions Architecture.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />

<script>
  window.TWEAKS = { "playfulness": 0 };
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="module" src="data.js"></script>
<script type="text/babel" src="components/Icons.jsx"></script>
<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/Hero.jsx"></script>
<script type="text/babel" src="components/About.jsx"></script>
<script type="text/babel" src="components/Sections.jsx"></script>
<script type="text/babel" src="components/Tweaks.jsx"></script>
</head>
<body>
<div class="bg-grid"></div>
<div class="scanlines"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [theme, setTheme] = useState(() => localStorage.getItem('vs-theme') || 'dark');
  const [play, setPlay] = useState(window.TWEAKS?.playfulness ?? 0);
  const [activeSection, setActiveSection] = useState('home');

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('vs-theme', theme);
  }, [theme]);

  useEffect(() => {
    document.documentElement.style.setProperty('--play', String(play));
  }, [play]);

  // scroll spy
  useEffect(() => {
    const ids = ['home', 'about', 'certs', 'projects', 'experience', 'interests', 'contact'];
    const onScroll = () => {
      const y = window.scrollY + 160;
      let current = 'home';
      for (const id of ids) {
        const el = document.getElementById(id);
        if (el && el.offsetTop <= y) current = id;
      }
      setActiveSection(current);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  // reveal on scroll
  useEffect(() => {
    const els = document.querySelectorAll('section, .tile, .cert, .proj, .exp, .contact-row');
    els.forEach(e => e.classList.add('reveal'));
    const io = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        if (en.isIntersecting) {
          en.target.classList.add('in');
          io.unobserve(en.target);
        }
      });
    }, { threshold: 0.08 });
    els.forEach(e => io.observe(e));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav theme={theme} onToggleTheme={() => setTheme(theme === 'dark' ? 'light' : 'dark')} activeSection={activeSection} />
      <main>
        <Hero />
        <About />
        <Certs />
        <Projects />
        <Experience />
        <Interests />
        <Contact />
        <Foot />
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
